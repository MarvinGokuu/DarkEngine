# ═══════════════════════════════════════════════════════════════
# DARK ENGINE - PRODUCTION CONFIGURATION
# ═══════════════════════════════════════════════════════════════
# Profile: PRODUCTION (Maximum Performance)
# Target Latency: <150ns
# Boot Time: <1ms
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# LOGGING (Zero-Cost when disabled)
# ───────────────────────────────────────────────────────────────
dark.logging.enabled=false
dark.logging.level=ERROR
dark.logging.async=true
dark.logging.buffer.size=1024

# ───────────────────────────────────────────────────────────────
# METRICS (Minimal Sampling)
# ───────────────────────────────────────────────────────────────
dark.metrics.enabled=true
dark.metrics.sampling=0.001
dark.metrics.server.enabled=true
dark.metrics.server.port=13000

# ───────────────────────────────────────────────────────────────
# VALIDATION (Disabled for maximum performance)
# ───────────────────────────────────────────────────────────────
dark.validation.enabled=false
dark.validation.input=false
dark.validation.memory=false

# ───────────────────────────────────────────────────────────────
# BUS CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.bus.capacity=1024
dark.bus.backpressure=DROP
dark.bus.padding.enabled=true

# ───────────────────────────────────────────────────────────────
# KERNEL CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.kernel.tick.rate=60
dark.kernel.thread.pinning=true
dark.kernel.thread.core=1

# ───────────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.memory.vault.size=1048576
dark.memory.alignment=64

# ───────────────────────────────────────────────────────────────
# PERFORMANCE TUNING
# ───────────────────────────────────────────────────────────────
dark.performance.jit.warmup=true
dark.performance.gc.zgc=true
