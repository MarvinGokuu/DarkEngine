# ═══════════════════════════════════════════════════════════════
# DARK ENGINE - DEVELOPMENT CONFIGURATION
# ═══════════════════════════════════════════════════════════════
# Profile: DEVELOPMENT (Maximum Observability)
# Target: Full debugging and monitoring
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# LOGGING (Full logging enabled)
# ───────────────────────────────────────────────────────────────
dark.logging.enabled=true
dark.logging.level=DEBUG
dark.logging.async=true
dark.logging.buffer.size=4096

# ───────────────────────────────────────────────────────────────
# METRICS (Full sampling)
# ───────────────────────────────────────────────────────────────
dark.metrics.enabled=true
dark.metrics.sampling=1.0
dark.metrics.server.enabled=true
dark.metrics.server.port=13000

# ───────────────────────────────────────────────────────────────
# VALIDATION (All validations enabled)
# ───────────────────────────────────────────────────────────────
dark.validation.enabled=true
dark.validation.input=true
dark.validation.memory=true

# ───────────────────────────────────────────────────────────────
# BUS CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.bus.capacity=1024
dark.bus.backpressure=BLOCK
dark.bus.padding.enabled=true

# ───────────────────────────────────────────────────────────────
# KERNEL CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.kernel.tick.rate=60
dark.kernel.thread.pinning=true
dark.kernel.thread.core=1

# ───────────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ───────────────────────────────────────────────────────────────
dark.memory.vault.size=1048576
dark.memory.alignment=64

# ───────────────────────────────────────────────────────────────
# PERFORMANCE TUNING
# ───────────────────────────────────────────────────────────────
dark.performance.jit.warmup=true
dark.performance.gc.zgc=true
