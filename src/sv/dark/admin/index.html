<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dark-Engine | Developer Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #text-block {
      position: absolute;
      left: 50%;
      top: 68%;
      transform: translate(-50%, -50%);
      text-align: center;
      transition: transform 0.08s ease-out;
      white-space: nowrap;
    }

    #eng-name {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
    }

    #eng-title {
      font-size: 52px;
      font-weight: 200;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1;
    }

    #eng-version {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
    }

    #eng-sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 5px;
      color: rgba(200, 80, 30, 0.85);
      margin-top: 16px;
      text-transform: uppercase;
    }

    /* Developer Menu Buttons */
    #dev-menu {
      margin-top: 30px;
      pointer-events: auto;
      /* Enable clicking */
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      background: rgba(255, 120, 30, 0.1);
      border: 1px solid rgba(255, 120, 30, 0.5);
      color: #fff;
      padding: 10px 24px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255, 120, 30, 0.3);
      box-shadow: 0 0 15px rgba(255, 120, 30, 0.4);
      transform: translateY(-2px);
    }

    #cursor-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      background: rgba(255, 160, 60, 0.9);
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(255, 120, 30, 0.8);
    }

    #tier-badge {
      position: absolute;
      bottom: 20px;
      right: 24px;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255, 100, 30, 0.35);
      z-index: 10;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>

<body>
  <div class="wrap" id="wrap">
    <canvas id="c"></canvas>
    <div id="cursor-dot"></div>
    <div id="overlay">
      <div id="text-block">
        <div id="eng-name">
          <span id="eng-title">Dark-Engine</span>
          <span id="eng-version">v1.0</span>
        </div>
        <div id="eng-sub">NATIVE EDITOR HOST</div>

        <div id="dev-menu">
          <a href="http://localhost:13000/editor" class="btn" onclick="console.log('Entrando al editor... ');">APP
            EDITOR</a>
        </div>
      </div>
    </div>
    <div id="tier-badge">TIER 0 · GEAR 1 · 60 FPS</div>
  </div>

  <script>
    const wrap = document.getElementById('wrap');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const dot = document.getElementById('cursor-dot');
    const textBlock = document.getElementById('text-block');

    let W, H, t = 0;
    let mx = 0, my = 0;
    let parallaxX = 0, parallaxY = 0;
    let targetPX = 0, targetPY = 0;

    function resize() {
      W = canvas.width = wrap.clientWidth;
      H = canvas.height = wrap.clientHeight;
    }
    resize();

    // Nebula
    function drawNebula(t) {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const cx = W * 0.52, cy = H * 0.44;

      let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.40);
      g.addColorStop(0, 'rgba(255,170,50,0.16)');
      g.addColorStop(0.25, 'rgba(210,65,10,0.20)');
      g.addColorStop(0.6, 'rgba(130,18,4,0.12)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

      let g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.10);
      g2.addColorStop(0, 'rgba(255,245,190,0.88)');
      g2.addColorStop(0.18, 'rgba(255,190,70,0.45)');
      g2.addColorStop(0.55, 'rgba(190,70,8,0.18)');
      g2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

      let g3 = ctx.createRadialGradient(cx + W * 0.17, cy - H * 0.20, 0, cx + W * 0.17, cy - H * 0.20, H * 0.26);
      g3.addColorStop(0, 'rgba(190,28,8,0.16)');
      g3.addColorStop(0.5, 'rgba(150,12,4,0.08)');
      g3.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g3; ctx.fillRect(0, 0, W, H);

      let g4 = ctx.createRadialGradient(cx - W * 0.19, cy + H * 0.16, 0, cx - W * 0.19, cy + H * 0.16, H * 0.28);
      g4.addColorStop(0, 'rgba(170,18,4,0.14)');
      g4.addColorStop(0.5, 'rgba(110,8,2,0.07)');
      g4.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g4; ctx.fillRect(0, 0, W, H);

      let g5 = ctx.createRadialGradient(cx - 8, cy + 6, 0, cx, cy, H * 0.055);
      g5.addColorStop(0, 'rgba(150,215,255,0.65)');
      g5.addColorStop(0.4, 'rgba(70,150,210,0.18)');
      g5.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g5; ctx.fillRect(0, 0, W, H);
    }

    function drawRays(t) {
      const cx = W * 0.52, cy = H * 0.44;
      ctx.save();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + t * 0.0003;
        const len = (0.14 + (i % 3) * 0.07) * Math.min(W, H);
        const flick = 0.5 + Math.sin(t * 0.002 + i * 1.3) * 0.3;
        const gr = ctx.createLinearGradient(cx, cy, cx + Math.cos(a) * len, cy + Math.sin(a) * len);
        gr.addColorStop(0, `rgba(255,195,75,${0.16 * flick})`);
        gr.addColorStop(1, 'rgba(255,90,8,0)');
        ctx.strokeStyle = gr;
        ctx.lineWidth = 0.8 + Math.random() * 0.4;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Particles
    const N = 200;
    const parts = [];

    function mkPart() {
      const angle = Math.random() * Math.PI * 2;
      const r = 50 + Math.random() * Math.min(W, H) * 0.44;
      const cx = W * 0.52, cy = H * 0.44;
      return {
        x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r,
        vx: 0, vy: 0,
        size: 0.5 + Math.random() * 1.6,
        alpha: 0.25 + Math.random() * 0.75,
        warm: Math.random() < 0.72,
        speed: 0.014 + Math.random() * 0.022,
        angle, r,
        drift: (Math.random() - 0.5) * 0.0003
      };
    }

    function initParts() {
      parts.length = 0;
      for (let i = 0; i < N; i++) parts.push(mkPart());
    }
    initParts();

    function drawParts(t) {
      const cx = W * 0.52, cy = H * 0.44;
      for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        p.angle += p.drift;
        const dx = mx - p.x, dy = my - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const repel = 95;
        if (dist < repel && dist > 0) {
          const force = (repel - dist) / repel;
          p.vx -= dx / dist * force * 1.6;
          p.vy -= dy / dist * force * 1.6;
        }
        const tx = cx + Math.cos(p.angle) * p.r;
        const ty = cy + Math.sin(p.angle) * p.r;
        p.vx += (tx - p.x) * p.speed;
        p.vy += (ty - p.y) * p.speed;
        p.vx *= 0.87; p.vy *= 0.87;
        p.x += p.vx; p.y += p.vy;
        const flick = 0.65 + Math.sin(t * 0.004 + i) * 0.35;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.warm
          ? `rgba(255,${120 + Math.random() * 60},${30 + Math.random() * 30},${p.alpha * flick})`
          : `rgba(120,190,255,${p.alpha * flick})`;
        ctx.fill();
      }
    }

    wrap.addEventListener('mousemove', e => {
      const r = wrap.getBoundingClientRect();
      mx = e.clientX - r.left;
      my = e.clientY - r.top;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
      targetPX = (mx / W - 0.5) * 18;
      targetPY = (my / H - 0.5) * 11;
    });
    wrap.addEventListener('mouseleave', () => { targetPX = 0; targetPY = 0; });

    function loop() {
      t++;
      parallaxX += (targetPX - parallaxX) * 0.055;
      parallaxY += (targetPY - parallaxY) * 0.055;

      drawNebula(t);
      drawRays(t);
      drawParts(t);

      const bx = W / 2 + parallaxX * 1.3;
      const by = H * 0.68 + parallaxY * 1.3;
      textBlock.style.left = bx + 'px';
      textBlock.style.top = by + 'px';

      requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('resize', () => { resize(); initParts(); });
  </script>
</body>

</html>
